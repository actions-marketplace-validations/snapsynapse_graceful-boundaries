name: "Graceful Boundaries Conformance Check"
description: "Check a live service's Graceful Boundaries conformance level and fail CI below a minimum level."
author: "PAICE.work PBC"
branding:
  icon: "shield"
  color: "blue"

inputs:
  url:
    description: "Base URL of the service to check, e.g. https://staging.example.com"
    required: true
  min-level:
    description: "Minimum confirmed conformance level (0-4). The job fails below this. Note: Levels 1 and 3 require observing a live refusal and cannot be confirmed passively; 2 and 4 are the practical CI gates."
    required: false
    default: "0"
  limits-path:
    description: "Custom limits discovery path (default: /api/limits then /.well-known/limits)"
    required: false
    default: ""
  json:
    description: "Emit machine-readable JSON report to stdout (true/false)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Run conformance check
      shell: bash
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_MIN_LEVEL: ${{ inputs.min-level }}
        INPUT_LIMITS_PATH: ${{ inputs.limits-path }}
        INPUT_JSON: ${{ inputs.json }}
      run: |
        ARGS=("$INPUT_URL" --min-level "$INPUT_MIN_LEVEL")
        if [ -n "$INPUT_LIMITS_PATH" ]; then
          ARGS+=(--limits-path "$INPUT_LIMITS_PATH")
        fi
        if [ "$INPUT_JSON" = "true" ]; then
          ARGS+=(--json)
        fi
        node "${{ github.action_path }}/evals/check.js" "${ARGS[@]}"
